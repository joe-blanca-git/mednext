<div class="d-flex min-vh-100 bg-light-modern" id="wrapper" (click)="closeDropdowns()">
  <!-- Left Collapsible Sidebar -->
  <aside class="bg-dark-sidebar text-white sidebar shadow-lg" [class.collapsed]="sidebarCollapsed" (click)="$event.stopPropagation()">

    <!-- Brand / Logo Header -->
    <div class="sidebar-brand-container d-flex align-items-center justify-content-between p-3 border-bottom border-secondary border-opacity-25">
      <div class="d-flex justify-content-center align-items-center overflow-hidden w-100">
        <div class="logo-wrapper">
          <img src="logos/logo.png" alt="MedNext Logo" class="sidebar-logo" [class.collapsed-logo]="sidebarCollapsed">
        </div>
      </div>
      <button class="btn btn-outline-light btn-sm border-0 d-md-none p-1" (click)="toggleSidebar()">
        <i class="fas fa-times fs-5"></i>
      </button>
    </div>

    <!-- Navigation List -->
    <div class="sidebar-menu-list py-3 flex-grow-1">
      <app-menu-side [sidebarCollapsed]="sidebarCollapsed" [activeTab]="activeTab" (tabChange)="setActiveTab($event)"></app-menu-side>
    </div>

    <!-- Bottom Sidebar Collapse Toggle button -->
    <div class="border-top border-secondary border-opacity-25 p-2 text-center">
      <button class="btn btn-sm btn-link text-muted text-decoration-none w-100 sidebar-collapse-trigger" (click)="toggleSidebar()">
        <i class="fas" [class.fa-chevron-left]="!sidebarCollapsed" [class.fa-chevron-right]="sidebarCollapsed"></i>
        <span class="ms-2 small fw-semibold" *ngIf="!sidebarCollapsed">Ocultar Menu</span>
      </button>
    </div>
  </aside>

  <!-- Main View Container -->
  <div class="main-layout-wrapper d-flex flex-column flex-grow-1" [class.shifted]="sidebarCollapsed">
    <!-- Header -->
    <header class="navbar navbar-expand navbar-light bg-white border-bottom shadow-sm px-3 px-md-4 py-2 sticky-top justify-content-between">
      <div class="d-flex align-items-center gap-2">
        <!-- Sidebar Toggle Hamburger -->
        <button class="btn btn-none border-0 rounded-circle bg-transparent p-2 d-flex align-items-center justify-content-center header-menu-toggle" (click)="toggleSidebar(); $event.stopPropagation()">
          <i class="bi fs-5" [ngClass]="sidebarCollapsed ? 'bi-layout-sidebar-inset' : 'bi-layout-sidebar-inset-reverse'"></i>
        </button>
        <!-- Page Title Context -->
        <h5 class="fw-bold mb-0 text-dark ms-2">{{ pageTitle }}</h5>
      </div>
      <!-- Right Header Navigation Items -->
      <div class="d-flex align-items-center gap-3">
        <!-- Vertical Line Separation -->
        <div class="vr bg-secondary bg-opacity-25 my-1 d-none d-sm-block" style="height: 24px; width: 1.5px;"></div>

        <!-- Student Profile Dropdown -->
        <div class="position-relative">

          <button class="btn d-flex align-items-center gap-2 p-1 border-0 bg-transparent shadow-none" (click)="toggleProfile($event)">

            <div [ngClass]="{'bg-loading': isLoadingPage, 'bg-gradient-avatar': !isLoadingPage}" class="avatar-circle-sm  text-white fw-bold d-flex align-items-center justify-content-center rounded-circle shadow-sm">
              <span *ngIf="!isLoadingPage">{{ getInitials(studentName) }}</span>
            </div>

            <div class="text-start d-none d-md-block" style="line-height: 1.1;">
              <div class="fw-bold text-dark small" [ngClass]="{'bg-loading': isLoadingPage}">
                <span *ngIf="!isLoadingPage">{{ studentName }}</span>
                <span *ngIf="isLoadingPage">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
              </div>
            </div>

            <i class="fas fa-chevron-down text-muted small d-none d-md-inline ms-1" style="font-size: 0.7rem;"></i>

          </button>

          <!-- Profile Dropdown Menu Card -->
          <div class="dropdown-menu dropdown-menu-end shadow-lg border-0 rounded-4 p-2 dropdown-menu-custom animated-fade-in show" *ngIf="showProfileDropdown" style="width: 270px; position: absolute; right: 0; top: 48px; z-index: 1050;" (click)="$event.stopPropagation()">
            
            <div class="p-3 border-bottom text-center">
              <div [ngClass]="{'bg-loading': isLoadingPage, 'bg-gradient-avatar': !isLoadingPage}" class="avatar-circle-lg text-white fw-bold d-flex align-items-center justify-content-center rounded-circle mx-auto mb-2 fs-3 shadow">
                <span *ngIf="!isLoadingPage">{{ getInitials(studentName) }}</span>
              </div>
              <h6 class="mb-1 fw-bold text-dark text-truncate" [ngClass]="{'bg-loading': isLoadingPage}">
                 <span *ngIf="!isLoadingPage">{{ studentName }}</span>
                 <span *ngIf="isLoadingPage">&nbsp;</span>
              </h6>
            </div>

            <div class="py-1">

              <button class="dropdown-item py-2 px-3 rounded-3 d-flex align-items-center gap-2.5 cursor-pointer text-muted-hover transition" [disabled]="isLoadingPage">
                <i class="me-4 fa-regular fa-user text-muted" style="width: 16px;"></i>
                <span class="small font-medium">Dados Cadastrais</span>
              </button>
              <button class="dropdown-item py-2 px-3 rounded-3 d-flex align-items-center gap-2.5 cursor-pointer text-muted-hover transition" [disabled]="isLoadingPage" (click)="setActiveTab('support')">
                <i class="me-4 fa-regular fa-question-circle text-muted" style="width: 16px;"></i>
                <span class="small font-medium">Central de Ajuda</span>
              </button>
              <div class="dropdown-divider border-opacity-10 my-1"></div>
              <button class="dropdown-item py-2 px-3 rounded-3 text-danger d-flex align-items-center gap-2.5 cursor-pointer transition-bg-danger" (click)="logOut()">
                <i class="me-4 fas fa-sign-out-alt" style="width: 16px;"></i>
                <span class="small fw-semibold">Sair</span>
              </button>
            </div>
          </div>
        </div>

      </div>
    </header>
    <!-- Main Content Outlet Area -->
    <main class="page-content-canvas flex-grow-1 overflow-auto p-3 p-md-4 pt-1 pt-md-2">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>


<!-- ============================================== -->
<!-- INTERACTIVE DYNAMIC TOAST / ALERTS             -->
<!-- ============================================== -->
<!-- Copy Code Floating toast notification -->
<div class="custom-floating-toast rounded-4 p-3 shadow-lg border-0 text-white d-flex align-items-center gap-2.5 animated-slide-in" *ngIf="showToast" style="background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);">
  <i class="fas fa-check-circle text-success fs-5"></i>
  <span class="small fw-semibold">{{ toastMessage }}</span>
</div>
